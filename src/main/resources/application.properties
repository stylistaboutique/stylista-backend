# ===== SERVER =====
server.port=${PORT:8080}

# ===== DATABASE — Supabase Postgres =====
spring.datasource.url=${JDBC_DATABASE_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===== JPA =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# ===== ADMIN CREDENTIALS =====
app.admin.username=${ADMIN_USERNAME:admin}
app.admin.password=${ADMIN_PASSWORD:stylista@2025}
app.admin.token-secret=${ADMIN_TOKEN_SECRET:stylista-secret-change-me}

# ===== CASHBACK DEFAULTS =====
app.cashback.default-percent=20
app.cashback.default-expiry-days=60

# ===== NOTIFICATIONS (off for now) =====
app.notifications.enabled=${NOTIFICATIONS_ENABLED:false}

# ===== CORS =====
app.cors.allowed-origins=${CORS_ORIGINS:https://stylistaboutique.com,https://www.stylistaboutique.com,http://localhost:3000,http://127.0.0.1:5500,http://localhost:5500}