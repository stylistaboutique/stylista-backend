name: Monthly Supabase Backup

on:
  schedule:
    - cron: "30 2 1 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Install PostgreSQL client (v16)
        run: |
          sudo sh -c 'echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/pgdg.gpg
          sudo apt-get update
          sudo apt-get install -y postgresql-client-16

      - name: Create compressed dump
        env:
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          JDBC_DATABASE_URL: ${{ secrets.JDBC_DATABASE_URL }}
        run: |
          set -euo pipefail
          mkdir -p backups
          STAMP=$(date -u +'%Y-%m')

          BASE="${JDBC_DATABASE_URL#jdbc:}"
          HOSTPART="${BASE#postgresql://}"
          ENC_PASS=$(python3 -c "import urllib.parse,os;print(urllib.parse.quote(os.environ['DB_PASSWORD'],safe=''))")
          CONN="postgresql://${DB_USERNAME}:${ENC_PASS}@${HOSTPART}"

          echo "Testing connection..."
          psql "$CONN" -c "SELECT count(*) FROM information_schema.tables WHERE table_schema='public';"

          echo "Dumping (uncompressed first, so failures are caught)..."
          pg_dump "$CONN" --no-owner --no-privileges > "backups/stylista-${STAMP}.sql"

          RAW_SIZE=$(stat -c%s "backups/stylista-${STAMP}.sql")
          echo "Raw dump size: ${RAW_SIZE} bytes"
          if [ "$RAW_SIZE" -lt 200 ]; then
            echo "ERROR: dump is suspiciously small (${RAW_SIZE} bytes). Something went wrong."
            cat "backups/stylista-${STAMP}.sql"
            exit 1
          fi

          gzip -f "backups/stylista-${STAMP}.sql"
          echo "Final file:"
          ls -lh backups/

      - name: Prune dumps older than 12 months
        run: |
          cd backups
          ls -1t *.sql.gz | tail -n +13 | xargs -r rm -f
          cd ..

      - name: Commit backup
        run: |
          git config user.name  "backup-bot"
          git config user.email "backup-bot@users.noreply.github.com"
          git add backups/
          git commit -m "Monthly DB backup $(date -u +'%Y-%m')" || echo "No changes to commit"
          git push
